<style>
:root{
  --stage-black:#15110d;
  --curtain:#241b14;
  --curtain-light:#2e2319;
  --cream:#f3e6cc;
  --amber:#e8a23d;
  --amber-dim: rgba(232,162,61,0.3);
  --crimson:#e2503a;
  --smoke:#9c8f7e;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--stage-black);
  color:var(--cream);
  font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 16px;
}
.page{ max-width:520px; width:100%; }
.eyebrow-row{ display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px; }
.eyebrow-row svg{ animation: bob 3s ease-in-out infinite; }
@keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }
h1{
  font-family:'Anton',sans-serif;
  font-size:clamp(22px,5.5vw,30px);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin:0;
  color:var(--cream);
}
.subtitle{
  text-align:center;
  color:var(--smoke);
  font-size:14px;
  margin:0 0 36px;
}
.stage{ position:relative; margin:0 auto 22px; }
.spotlight{
  position:absolute;
  top:-70px; left:50%;
  transform:translateX(-50%);
  width:340px; height:230px;
  background:radial-gradient(ellipse at top, var(--amber-dim), transparent 70%);
  pointer-events:none;
  z-index:0;
}
.bulb-row{ display:flex; justify-content:space-between; padding:0 16px; position:relative; z-index:2; }
.bulb-row.top{ margin-bottom:-6px; }
.bulb-row.bottom{ margin-top:-6px; }
.bulb{ width:6px; height:6px; border-radius:50%; background:var(--amber); opacity:.3; animation:bulbGlow 1.6s ease-in-out infinite; }
@keyframes bulbGlow{
  0%,100%{ opacity:.25; box-shadow:none; }
  50%{ opacity:1; box-shadow:0 0 5px var(--amber), 0 0 10px var(--amber); }
}
@media (prefers-reduced-motion: reduce){
  .bulb{ animation:none; opacity:.7; }
  .eyebrow-row svg{ animation:none; }
}
.card{
  position:relative; z-index:1;
  background:var(--curtain);
  border:1px solid rgba(232,162,61,0.25);
  border-radius:10px;
  padding:30px 24px 24px;
  text-align:center;
}
.badge-row{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:18px; }
.dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
#cat-badge{
  font-family:'Anton',sans-serif;
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--amber);
  border:1px solid var(--amber-dim);
  padding:4px 12px;
  border-radius:999px;
}
#topic-text{
  font-size:clamp(19px,4.4vw,25px);
  font-weight:600;
  line-height:1.45;
  margin:0 0 16px;
  min-height:96px;
  display:flex; align-items:center; justify-content:center;
}
#topic-count{
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:var(--smoke);
  letter-spacing:0.5px;
  margin:0;
}
.randomize-btn{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:var(--amber);
  color:var(--stage-black);
  border:none;
  border-radius:999px;
  font-family:'Anton',sans-serif;
  font-size:15px;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:transform .15s ease, background .2s ease;
}
.randomize-btn:hover{ background:#f0b15c; }
.randomize-btn:active{ transform:scale(.97); }
.divider{ display:flex; align-items:center; gap:10px; margin:36px 0 20px; color:var(--smoke); }
.divider::before,.divider::after{ content:""; flex:1; height:1px; background:rgba(232,162,61,0.2); }
.divider span{ font-family:'Anton',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; }
.timer-section{ text-align:center; }
.rec-badge{
  display:none;
  align-items:center; gap:6px;
  justify-content:center;
  margin-bottom:12px;
  font-family:'Anton',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase;
  color:var(--crimson);
}
.rec-badge.show{ display:inline-flex; }
.rec-dot{ width:8px; height:8px; border-radius:50%; background:var(--crimson); animation:pulse 1s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.3;} }
#timer-display{
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:clamp(46px,12vw,60px);
  color:var(--cream);
  margin:0 0 16px;
  transition:color .3s ease;
}
.progress-track{ height:6px; background:var(--curtain-light); border-radius:99px; overflow:hidden; margin-bottom:22px; }
#timer-bar{ height:100%; width:100%; background:var(--amber); border-radius:99px; transition:width .2s linear, background .3s ease; }
.btn-row{ display:flex; gap:10px; justify-content:center; }
.pill-btn{
  padding:10px 22px;
  border-radius:999px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  display:flex; align-items:center; gap:8px;
  background:transparent;
  transition:background .2s ease;
}
#start-btn{ border:1.5px solid var(--amber); color:var(--amber); }
#start-btn:hover{ background:rgba(232,162,61,0.1); }
#reset-btn{ border:1.5px solid var(--smoke); color:var(--smoke); }
#reset-btn:hover{ background:rgba(156,143,126,0.1); }
.hint{ text-align:center; color:var(--smoke); font-size:12.5px; margin-top:18px; }
button{ font-family:inherit; }
button:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
@media (max-width:380px){
  .card{ padding:24px 16px 20px; }
  .bulb-row{ padding:0 8px; }
}
</style>

        </svg>
        Reset
      </button>
    </div>
    <p class="hint">Tekan mulai, lalu ngomong terus sampai bel berbunyi.</p>
  </div>
</div>

const topics = [];
topicsByCat.forEach((arr, i) => arr.forEach(t => topics.push({text:t, cat:i})));

function buildBulbs(){
  const top = document.getElementById('bulb-row-top');
  const bottom = document.getElementById('bulb-row-bottom');
  const count = 16;
  for(let i=0;i<count;i++){
    const b1 = document.createElement('div');
    b1.className='bulb';
    b1.style.animationDelay = (i*0.08)+'s';
    top.appendChild(b1);
    const b2 = document.createElement('div');
    b2.className='bulb';
    b2.style.animationDelay = (i*0.08+0.4)+'s';
    bottom.appendChild(b2);
  }
}

let lastIndex = -1;
let sessionCount = 0;
let timerInterval = null;
let timeLeft = 60;
let running = false;

function pickRandom(){
  let idx;
  do { idx = Math.floor(Math.random()*topics.length); } while (idx === lastIndex && topics.length > 1);
  lastIndex = idx;
  const t = topics[idx];
  document.getElementById('topic-text').textContent = t.text;
  document.getElementById('cat-badge').textContent = categories[t.cat].name;
  document.getElementById('cat-dot').style.background = categories[t.cat].color;
  sessionCount++;
  document.getElementById('topic-count').textContent = "Topik no. " + String(sessionCount).padStart(3,'0') + " / " + topics.length;
  resetTimer();
}

function formatTime(s){
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return m + ":" + sec;
}

function updateDisplay(){
  document.getElementById('timer-display').textContent = formatTime(timeLeft);
  const pct = (timeLeft/60)*100;
  document.getElementById('timer-bar').style.width = pct + '%';
  const display = document.getElementById('timer-display');
  if (timeLeft <= 10) {
    document.getElementById('timer-bar').style.background = 'var(--crimson)';
    display.style.color = 'var(--crimson)';
  } else {
    document.getElementById('timer-bar').style.background = 'var(--amber)';
    display.style.color = 'var(--cream)';
  }
}

function beep(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.value = 0.15;
    o.start();
    setTimeout(function(){ o.stop(); ctx.close(); }, 300);
  } catch(e){}
}

function setRunningUI(isRunning){
  const badge = document.getElementById('rec-badge');
  if (isRunning) badge.classList.add('show'); else badge.classList.remove('show');
}

function tick(){
  timeLeft--;
  updateDisplay();
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    running = false;
    setRunningUI(false);
    beep();
    document.getElementById('start-label').textContent = 'Mulai';
  }
}

function startPause(){
  if (running) {
    clearInterval(timerInterval);
    running = false;
    setRunningUI(false);
    document.getElementById('start-label').textContent = 'Lanjut';
  } else {
    if (timeLeft <= 0) timeLeft = 60;
    running = true;
    setRunningUI(true);
    document.getElementById('start-label').textContent = 'Pause';
    timerInterval = setInterval(tick, 1000);
  }
}

function resetTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  setRunningUI(false);
  timeLeft = 60;
  updateDisplay();
  document.getElementById('start-label').textContent = 'Mulai';
}

document.getElementById('randomize-btn').addEventListener('click', pickRandom);
document.getElementById('start-btn').addEventListener('click', startPause);
document.getElementById('reset-btn').addEventListener('click', resetTimer);

buildBulbs();
pickRandom();
updateDisplay();
</script>
